services:
  # Marketing landing page — arvid.work
  - type: web
    name: arvid-site
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npx vite build --config vite.config.site.ts
    staticPublishPath: ./dist-site
    buildFilter:
      paths:
        - src/site/**
        - src/styles/**
        - shared/**
        - package.json
        - package-lock.json
        - vite.config.site.ts
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_APP_URL
        sync: false  # https://app.arvid.work
      - key: VITE_API_BASE
        sync: false  # https://arvid-api.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: NODE_VERSION
        value: "20"

  # Dashboard app — app.arvid.work
  - type: web
    name: arvid-web
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    buildFilter:
      paths:
        - src/app/**
        - src/styles/**
        - shared/**
        - index.html
        - package.json
        - package-lock.json
        - vite.config.ts
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false  # https://arvid-api.onrender.com/api
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: NODE_VERSION
        value: "20"

  # API server — Express BFF
  - type: web
    name: arvid-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: npm ci
    startCommand: node --import tsx server/index.ts
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - server/**
        - shared/**
        - package.json
        - package-lock.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SITE_ORIGIN
        sync: false  # https://arvid.work
      - key: APP_ORIGIN
        sync: false  # https://app.arvid.work
      - key: LINEAR_CLIENT_ID
        sync: false
      - key: LINEAR_CLIENT_SECRET
        sync: false
      - key: LINEAR_WEBHOOK_SECRET
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SUPABASE_OAUTH_CLIENT_ID
        sync: false
      - key: SUPABASE_OAUTH_CLIENT_SECRET
        sync: false
